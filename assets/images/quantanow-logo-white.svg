<svg width="180" height="40" viewBox="0 0 180 40" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Symbol/Icon -->
  <g id="quantum-symbol">
    <!-- Outer ring -->
    <circle cx="20" cy="20" r="18" stroke="url(#gradient1)" stroke-width="2" fill="none" opacity="0.8"/>
    <!-- Inner geometric shapes -->
    <path d="M20 4 L32 16 L20 28 L8 16 Z" fill="url(#gradient2)" opacity="0.9"/>
    <!-- Center dot -->
    <circle cx="20" cy="20" r="3" fill="#00E887"/>
    <!-- Orbiting elements -->
    <circle cx="32" cy="12" r="2" fill="#FFFFFF" opacity="0.9">
      <animateTransform attributeName="transform" attributeType="XML" type="rotate" 
        values="0 20 20;360 20 20" dur="10s" repeatCount="indefinite"/>
    </circle>
    <circle cx="8" cy="28" r="1.5" fill="#00E887" opacity="0.8">
      <animateTransform attributeName="transform" attributeType="XML" type="rotate" 
        values="0 20 20;-360 20 20" dur="15s" repeatCount="indefinite"/>
    </circle>
  </g>
  
  <!-- Text -->
  <g id="quantum-text">
    <!-- Quanta -->
    <text x="50" y="16" font-family="Inter, sans-serif" font-weight="700" font-size="16" fill="#FFFFFF">
      Quanta
    </text>
    <!-- Now -->
    <text x="50" y="30" font-family="Inter, sans-serif" font-weight="700" font-size="16" fill="#00E887">
      Now
    </text>
  </g>
  
  <!-- Gradients -->
  <defs>
    <linearGradient id="gradient1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFFFFF;stop-opacity:0.8"/>
      <stop offset="100%" style="stop-color:#00E887"/>
    </linearGradient>
    <linearGradient id="gradient2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00E887;stop-opacity:0.4"/>
      <stop offset="100%" style="stop-color:#FFFFFF;stop-opacity:0.3"/>
    </linearGradient>
  </defs>
</svg>